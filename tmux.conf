# ~/src/dev/tmux-session/tmux.conf
# Phone-friendly tmux config for streaming multiple Claude instances to a
# phone over Tailscale + Termux. Loaded via ~/.tmux.conf (which sources this
# file) and by the claude-session launcher (tmux -f this-file).

# --- Mobile ergonomics -------------------------------------------------------
set -g mouse on                 # Termux passes touches as clicks: tap the
                                # status bar to switch windows, tap/drag panes.
set -g base-index 1             # Windows start at 1 (easier thumb reach than 0).
setw -g pane-base-index 1
set -g escape-time 10           # Snappier Ctrl-b on mobile soft keyboards.
set -g renumber-windows on      # Keep window numbers contiguous after closing.
set -g history-limit 50000      # Scroll back through long Claude outputs.

# --- Status bar (readable on a small screen) ---------------------------------
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 60
set -g status-style 'bg=colour236,fg=white'
set -g status-left '#[bold] #S #[default]'
set -g status-right '#[fg=cyan]%H:%M #[fg=yellow]%d-%b'
setw -g window-status-current-style 'bg=blue,fg=white,bold'
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format ' #I:#W '

# --- Sane defaults -----------------------------------------------------------
set -g default-terminal 'tmux-256color'
set -ga terminal-overrides ',*256col*:Tc'   # truecolor for Claude's TUI
setw -g aggressive-resize on    # Resize per-window to the attached client,
                                # so a grouped phone session doesn't squeeze
                                # the laptop's view (see claude-session --grouped).

# --- attention: flag instances that ring the bell ----------------------------
# Claude Code rings the terminal bell when it finishes / needs input (enable the
# bell in Claude). Flag that window instead of stealing focus; the alert-bell
# hook (in bindings.conf) also fires a notification.
setw -g monitor-bell on
set  -g bell-action other
setw -g window-status-bell-style 'fg=black,bg=yellow,bold'

# --- claude-sessions key bindings + menu (generated by install.sh) -----------
# Loaded here so it applies to BOTH the boot session (started with -f this file)
# and interactive attaches. -q makes it harmless if not yet installed.
source-file -q ~/.config/claude-sessions/bindings.conf
